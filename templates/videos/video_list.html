<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stream Library</title>
    <style>
        body {
            background-color: #121212;
            color: #eee;
            font-family: sans-serif;
            margin: 0;
            padding: 20px;
        }
        .header-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1200px;
            margin: 0 auto 20px auto;
        }
        h1 { color: #00adb5; }
        .upload-nav-btn {
            background-color: #00adb5;
            color: #fff;
            padding: 10px 20px;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
        }
        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .video-card {
            background-color: #1e1e1e;
            border: 1px solid #333;
            border-radius: 8px;
            overflow: hidden;
        }
        .video-info { padding: 15px; }
        .video-title { font-size: 18px; margin: 0 0 10px 0; color: #fff; }
        .video-desc { color: #888; font-size: 14px; margin: 0; }
    </style>
</head>
<body>
    <div class="header-container">
        <h1>XNXN PRO</h1>
        <a href="{% url 'videos:upload_videos' %}" class="upload-nav-btn">+ Add Videos</a>
    </div>
    <hr style="border-color: #333; max-width: 1200px; margin-bottom: 30px;">
    
    <div class="video-grid">
        {% for video in videos %}
            <div class="video-card">
                <video controls preload="metadata" width="100%" style="background:#000;">
                    <source src="{% url 'videos:stream_video' video.pk %}" type="video/mp4">
                    Your browser does not support the video tag.
                </video>
                <div class="video-info">
                    <h2 class="video-title">{{ video.title }}</h2>
                    <p class="video-desc">{{ video.description }}</p>
                </div>
            </div>
        {% empty %}
            <p style="grid-column: 1/-1; text-align: center; color: #888;">No videos found. Upload files using the action button above.</p>
        {% endfor %}
    </div>
</body>
</html>
