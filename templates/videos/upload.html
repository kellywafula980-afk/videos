<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Upload Multiple Videos</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; background-color: #000000; color: #ffffff; }
        .container { max-width: 700px; margin: auto; background: #121212; padding: 30px; border-radius: 8px; border: 1px solid #222; }
        h1 { text-align: center; margin-bottom: 20px; }
        
        /* Dropzone Box style */
        .dropzone { border: 2px dashed #444; padding: 40px; text-align: center; background: #0a0a0a; border-radius: 6px; cursor: pointer; transition: border-color 0.2s; }
        .dropzone.dragover { border-color: #007bff; background: #111; }
        .dropzone p { margin: 0; font-size: 1.1em; color: #aaa; }
        
        #file-input { display: none; }
        
        /* File staging items */
        .file-list { margin-top: 20px; }
        .file-item { background: #1e1e1e; padding: 12px; margin-bottom: 8px; border-radius: 4px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #333; }
        .file-name { font-weight: bold; color: #fff; }
        .auto-title { font-size: 0.85em; color: #007bff; block-size: auto; }
        
        .upload-actions { margin-top: 20px; display: flex; justify-content: space-between; align-items: center; }
        .btn { padding: 10px 20px; border-radius: 4px; border: none; font-weight: bold; cursor: pointer; text-decoration: none; }
        .btn-submit { background: #28a745; color: white; }
        .btn-submit:hover { background: #218838; }
        .btn-cancel { background: #444; color: white; }
        .status-msg { margin-top: 15px; text-align: center; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h1>Power Multi-Video Upload</h1>
    
    <div class="dropzone" id="dropzone">
        <p>Drag & drop multiple video files here or <strong>click to browse</strong></p>
        <input type="file" id="file-input" multiple accept="video/mp4">
    </div>

    <div class="file-list" id="file-list"></div>

    <div class="upload-actions">
        <a href="{% url 'videos:video_list' %}" class="btn btn-cancel">← Back to Gallery</a>
        <button class="btn btn-submit" id="upload-btn" style="display: none;">Start Uploading</button>
    </div>

    <div class="status-msg" id="status-msg"></div>
</div>

<script>
    const dropzone = document.getElementById('dropzone');
    const fileInput = document.getElementById('file-input');
    const fileList = document.getElementById('file-list');
    const uploadBtn = document.getElementById('upload-btn');
    const statusMsg = document.getElementById('status-msg');
    
    let stagedFiles = [];

    // Trigger file selection window
    dropzone.addEventListener('click', () => fileInput.click());

    // Handle drag events
    dropzone.addEventListener('dragover', (e) => { e.preventDefault(); dropzone.classList.add('dragover'); });
    dropzone.addEventListener('dragleave', () => dropzone.classList.remove('dragover'));
    dropzone.addEventListener('drop', (e) => {
        e.preventDefault();
        dropzone.classList.remove('dragover');
        handleFiles(e.dataTransfer.files);
    });

    // Handle standard browse selection
    fileInput.addEventListener('change', (e) => handleFiles(e.target.files));

    function handleFiles(files) {
        for (let file of files) {
            if (file.type.startsWith('video/')) {
                stagedFiles.push(file);
            }
        }
        renderStagedFiles();
    }

    function renderStagedFiles() {
        fileList.innerHTML = '';
        if (stagedFiles.length === 0) {
            uploadBtn.style.display = 'none';
            return;
        }

        stagedFiles.forEach((file, index) => {
            // Replicate the backend filename extraction inside frontend preview
            let baseName = file.name.substring(0, file.name.lastIndexOf('.')) || file.name;
            let autoTitle = baseName.replace(/[_-]/g, ' ');

            const div = document.createElement('div');
            div.className = 'file-item';
            div.innerHTML = `
                <div>
                    <div class="file-name">${file.name}</div>
                    <div class="auto-title">Auto-assigned title: "<strong>${autoTitle}</strong>"</div>
                </div>
                <span style="color: #aaa; font-size: 0.9em;">Ready</span>
            `;
            fileList.appendChild(div);
        });
        
        uploadBtn.style.display = 'block';
    }

    // Handle AJAX bulk file submission
    uploadBtn.addEventListener('click', () => {
        if (stagedFiles.length === 0) return;

        const formData = new FormData();
        stagedFiles.forEach(file => {
            formData.append('files', file);
        });

        uploadBtn.disabled = true;
        statusMsg.style.color = '#007bff';
        statusMsg.innerText = 'Uploading files. Please wait...';

        fetch("{% url 'videos:upload_videos' %}", {
            method: 'POST',
            body: formData
        })
        .then(response => response.json())
        .then(data => {
            if (data.status === 'success') {
                statusMsg.style.color = '#28a745';
                statusMsg.innerText = `Success! ${data.videos.length} videos processed successfully.`;
                stagedFiles = [];
                setTimeout(() => {
                    window.location.href = "{% url 'videos:video_list' %}";
                }, 1500);
            } else {
                throw new Error('Upload failed');
            }
        })
        .catch(err => {
            uploadBtn.disabled = false;
            statusMsg.style.color = '#e50914';
            statusMsg.innerText = 'An error occurred during multi-upload submission.';
        });
    });
</script>
</body>
</html>
