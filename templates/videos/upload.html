<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Hub</title>
    <style>
        body { background-color: #121212; color: #eee; font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .upload-container { background-color: #1e1e1e; border: 1px solid #333; border-radius: 12px; padding: 40px; width: 100%; max-width: 500px; text-align: center; }
        .file-drop-area { position: relative; padding: 40px 20px; border: 2px dashed #00adb5; border-radius: 8px; background: rgba(0, 173, 181, 0.03); cursor: pointer; }
        .file-drop-area input[type="file"] { position: absolute; left: 0; top: 0; opacity: 0; width: 100%; height: 100%; cursor: pointer; }
        .btn-container { display: flex; gap: 15px; margin-top: 30px; }
        button, .btn-secondary { flex: 1; padding: 14px; font-weight: bold; border-radius: 6px; border: none; text-align: center; text-decoration: none; cursor: pointer; }
        button { background-color: #00adb5; color: white; }
        .btn-secondary { background: transparent; color: #eee; border: 1px solid #333; }
        .progress-container { display: none; margin-top: 25px; background: #252525; border-radius: 6px; height: 24px; position: relative; overflow: hidden; }
        .progress-bar { height: 100%; background-color: #00adb5; width: 0%; }
        .progress-text { position: absolute; width: 100%; text-align: center; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 12px; font-weight: bold; color: white; }
        #preview { margin-top: 15px; font-size: 13px; color: #00adb5; text-align: left; line-height: 1.5; }
    </style>
</head>
<body>
<div class="upload-container">
    <h2>Upload Multiple Videos</h2>
    <form id="upload-form" method="post" enctype="multipart/form-data">
        {% csrf_token %}
        <div class="file-drop-area">
            <span style="font-size: 30px;">📁</span>
            <p>Select MP4 Video Files</p>
            <input type="file" name="video_files" id="video-input" accept="video/mp4" multiple required>
        </div>
        <div id="preview"></div>
        <div class="progress-container" id="progress-wrapper">
            <div class="progress-bar" id="upload-progress"></div>
            <div class="progress-text" id="progress-label">0%</div>
        </div>
        <div class="btn-container">
            <a href="{% url 'videos:video_list' %}" class="btn-secondary">Back</a>
            <button type="submit" id="submit-btn">Upload</button>
        </div>
    </form>
</div>
<script>
    const input = document.getElementById('video-input');
    const preview = document.getElementById('preview');
    const form = document.getElementById('upload-form');
    const wrapper = document.getElementById('progress-wrapper');
    const bar = document.getElementById('upload-progress');
    const label = document.getElementById('progress-label');
    const btn = document.getElementById('submit-btn');

    input.addEventListener('change', () => {
        let list = [];
        for (let i = 0; i < input.files.length; i++) {
            list.push(`• ${input.files[i].name} (${(input.files[i].size / (1024 * 1024)).toFixed(2)} MB)`);
        }
        preview.innerHTML = list.join('<br>');
    });

    form.addEventListener('submit', (e) => {
        e.preventDefault();
        btn.disabled = true;
        btn.innerText = "Uploading...";
        wrapper.style.display = 'block';

        const xhr = new XMLHttpRequest();
        xhr.open('POST', window.location.href, true);

        xhr.upload.addEventListener('progress', (e) => {
            if (e.lengthComputable) {
                const percent = Math.round((e.loaded / e.total) * 100);
                bar.style.width = percent + '%';
                label.innerText = percent === 100 ? "Processing streams on server..." : percent + '%';
            }
        });

        xhr.onload = () => {
            if (xhr.status === 200) window.location.href = "{% url 'videos:video_list' %}";
            else alert("Upload failed due to platform tier limitations.");
        };
        xhr.send(new FormData(form));
    });
</script>
</body>
</html>
